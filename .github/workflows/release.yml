name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches src/bashly.yml version
        run: |
          version="$(grep -E '^version:' src/bashly.yml | head -1 | sed -E 's/^version:[[:space:]]*//; s/[[:space:]]*$//')"
          tag="${GITHUB_REF_NAME}"
          if [ "$version" != "$tag" ]; then
            echo "Tag $tag does not match src/bashly.yml version $version" >&2
            echo "Bump 'version:' in src/bashly.yml, regenerate, commit, then tag $version." >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Build production ocp via bashly
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/app" \
            dannyben/bashly:1.3.8 generate --env production
          bash -n ocp

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="ocp#ocp (single-file CLI, ${VERSION})"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
            gh release upload "${GITHUB_REF_NAME}" "$asset" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "ocp ${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --verify-tag \
              "$asset"
          fi
